<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>图片目录查看器</title>

<!-- ✅ 防 favicon 404 -->
<link rel="icon" href="data:;base64,iVBORw0KGgo=">

<style>
html,body{height:90%;margin:0;background:#111;color:#eee;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;}
#app{display:flex;flex-direction:column;height:100%;}

#bar{padding:8px;display:flex;gap:8px;flex-wrap:wrap;background:#1e1e1e;}
#bar select,#bar button{flex:1;min-width:120px;padding:6px 8px;background:#2b2b2b;color:#eee;border:1px solid #444;border-radius:6px;}

#view{flex:1;overflow:hidden;position:relative;touch-action:none;}
#img{
  position:absolute;left:50%;top:50%;
  max-width:100vw;max-height:90vh;
  transform:translate(-50%,-50%);
  transform-origin:center center;
  user-select:none;-webkit-user-drag:none;
}

#thumbnails{
  height:96px;background:#1a1a1a;
  overflow-x:auto;display:flex;align-items:center;
  padding:0 50%;box-sizing:border-box;
}
#thumbList{display:flex;gap:8px;}
.thumb{
  width:10vh;height:10vh;object-fit:cover;
  border:2px solid transparent;border-radius:6px;
  cursor:pointer;flex-shrink:0;
}
.thumb.active{border-color:#2f7edc;}

#info{padding:6px 10px;font-size:13px;background:#1e1e1e;}
</style>
</head>

<body>
<div id="app">
  <div id="bar">
    <button id="btnPrevFolder">← 目录</button>
    <select id="selFolder"><option>加载中…</option></select>
    <button id="btnNextFolder">目录 →</button>
  </div>

  <div id="view"><img id="img" /></div>
  <div id="info">正在加载列表…</div>
</div>

<div id="thumbnails">
  <div id="thumbList"></div>
</div>

<script>
/****************************
 * ✅ 防呆路径处理（最重要）
 ****************************/
const BASE_PATH = (() => {
  const p = location.pathname;
  // 去掉 /index.html
  return p.replace(/\/index\.html$/, '').replace(/\/$/, '');
})();

function asset(path) {
  return BASE_PATH + path;
}

/****************************
 * DOM 引用（统一入口）
 ****************************/
const dom = {
  view: document.getElementById('view'),
  img: document.getElementById('img'),
  info: document.getElementById('info'),
  selFolder: document.getElementById('selFolder'),
  btnPrevFolder: document.getElementById('btnPrevFolder'),
  btnNextFolder: document.getElementById('btnNextFolder'),
  thumbList: document.getElementById('thumbList')
};

/****************************
 * 状态管理
 ****************************/
const state = {
  folders: {},
  folderKeys: [],
  curFolder: '',
  curIndex: 0,

  scale: 1,
  tx: 0,
  ty: 0,

  dragging: false,
  lastX: 0,
  lastY: 0,
  baseTx: 0,
  baseTy: 0
};

/****************************
 * Transform
 ****************************/
function applyTransform() {
  dom.img.style.transform =
    `translate(-50%,-50%) translate(${state.tx}px,${state.ty}px) scale(${state.scale})`;
}

function resetTransform() {
  state.scale = 1;
  state.tx = 0;
  state.ty = 0;

  // if (dom.img.naturalWidth) {
  //   const sw = window.innerWidth;
  //   const sh = window.innerHeight - 60;
  //   state.scale = Math.min(
  //     sw / dom.img.naturalWidth,
  //     sh / dom.img.naturalHeight,
  //     1
  //   );
  // }
  applyTransform();
}

/****************************
 * 渲染
 ****************************/
function showCurrent() {
  const list = state.folders[state.curFolder];
  if (!list?.length) {
    dom.img.src = '';
    dom.info.textContent = state.curFolder + '：空';
    return;
  }

  // ✅ 防止越界
  if (state.curIndex < 0 || state.curIndex >= list.length) {
    state.curIndex = 0;
  }

  const rel = list[state.curIndex];

  dom.img.onload = null; // ✅ 不再强制 reset
  dom.img.src = asset('/images/' + rel);

  dom.info.textContent =
    `${state.curFolder} ${state.curIndex + 1}/${list.length} ${rel.split('/').pop()}`;

  updateThumbActive();
}

/****************************
 * 目录
 ****************************/
function switchFolder(offset) {
  const i = state.folderKeys.indexOf(state.curFolder);
  state.curFolder =
    state.folderKeys[(i + offset + state.folderKeys.length) % state.folderKeys.length];
  state.curIndex = 0;
  dom.selFolder.value = state.curFolder;
  showCurrent();
}

dom.selFolder.onchange = () => {
  state.curFolder = dom.selFolder.value;
  state.curIndex = 0;
  showCurrent();
};

dom.btnPrevFolder.onclick = () => switchFolder(-1);
dom.btnNextFolder.onclick = () => switchFolder(1);

/****************************
 * 缩略图
 ****************************/
function renderThumbs(list) {
  dom.thumbList.innerHTML = '';
  list.forEach((rel, i) => {
    const img = document.createElement('img');
    img.className = 'thumb';
    img.src = asset('/images/' + rel);
    img.dataset.index = i;
    img.onclick = () => {
      state.curIndex = i;
      showCurrent();
    };
    dom.thumbList.appendChild(img);
  });
}

function updateThumbActive() {
  document.querySelectorAll('.thumb').forEach((t, i) => {
    t.classList.toggle('active', i === state.curIndex);
  });
  const active = document.querySelector('.thumb.active');
  active?.scrollIntoView({ inline: 'center', block: 'nearest' });
}

/****************************
 * 拖拽
 ****************************/
dom.view.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  state.dragging = true;
  state.lastX = e.clientX;
  state.lastY = e.clientY;
  state.baseTx = state.tx;
  state.baseTy = state.ty;
});

dom.view.addEventListener('pointerup', () => state.dragging = false);
dom.view.addEventListener('pointercancel', () => state.dragging = false);

dom.view.addEventListener('pointermove', e => {
  if (!state.dragging) return;
  state.tx = state.baseTx + (e.clientX - state.lastX);
  state.ty = state.baseTy + (e.clientY - state.lastY);
  applyTransform();
});

/****************************
 * 缩放（鼠标中心）
 ****************************/
dom.view.addEventListener('wheel', e => {
  e.preventDefault();

  const rect = dom.img.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const oldScale = state.scale;
  const delta = e.deltaY > 0 ? 0.92 : 1.08;
  state.scale = Math.min(Math.max(state.scale * delta, 0.2), 8);

  state.tx += (mx - rect.width  / 2) * (1 - state.scale / oldScale);
  state.ty += (my - rect.height / 2) * (1 - state.scale / oldScale);

  applyTransform();
});

/****************************
 * 左右切换
 ****************************/
dom.view.addEventListener('click', e => {
  const list = state.folders[state.curFolder];
  if (!list || list.length <= 1) return;

  if (e.clientX < innerWidth / 2)
    state.curIndex = (state.curIndex - 1 + list.length) % list.length;
  else
    state.curIndex = (state.curIndex + 1) % list.length;

  showCurrent();
});

/****************************
 * ✅ 启动入口（唯一 fetch）
 ****************************/
fetch(asset('/list.json'))
  .then(res => {
    if (!res.ok) throw new Error('list.json not found');
    return res.json();
  })
  .then(list => {
    const folders = {};
    for (const rel of list) {
      const p = rel.split('/');
      const key = p.length >= 3 ? `${p[0]}/${p[1]}` : (p.length === 2 ? p[0] : '(根)');
      (folders[key] = folders[key] || []).push(rel);
    }

    state.folders = folders;
    state.folderKeys = Object.keys(folders).sort();
    state.curFolder = state.folderKeys[0];

    dom.selFolder.innerHTML = '';
    for (const k of state.folderKeys) {
      const o = document.createElement('option');
      o.value = k;
      o.text = `${k} (${folders[k].length})`;
      dom.selFolder.appendChild(o);
    }

    renderThumbs(list);
    showCurrent();
  })
  .catch(err => {
    dom.info.textContent = '加载失败：' + err.message;
    console.error(err);
  });
</script>
</body>
</html>
